<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>我的</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./me.css"/>
  <link rel="stylesheet" href="../common/responsive.css"/>
  <link rel="stylesheet" href="../common/page-transition.css?v=1.3.0"/>
  <script src="../common/page-transition.js?v=1.3.0"></script>
</head>
<body data-page="me">
  <div class="app-top">
    <button id="backBtn" class="btn ghost">← 返回</button>
    <div class="title">我的</div>
    <button id="logout" class="btn ghost">退出</button>
  </div>

  <div class="app-body">
    <div class="card">
      <div class="card-title">个人信息</div>
      <div class="row"><span class="k">姓名</span><span class="v" id="realName">--</span></div>
      <div class="row"><span class="k">账号</span><span class="v" id="userName">--</span></div>
      <div class="row" id="schoolRow" hidden><span class="k">学校</span><span class="v" id="schoolName"></span></div>
      <div class="row" id="classRow" hidden><span class="k">班级</span><span class="v" id="className"></span></div>
      <div class="row"><span class="k">学生ID</span><span class="v" id="studentId">--</span></div>
    </div>
    <div class="card">
      
      <div class="card-title">设置</div>

      <div class="row clickable" id="settingEntry">
        <span class="k">应用设置</span>
        <span class="v">进入 &gt;</span>
      </div>

      <div class="row clickable" id="aboutEntry">
        <span class="k">关于应用</span>
        <span class="v">进入 &gt;</span>
      </div>

    </div>
    <details class="debug">
      <summary>调试信息</summary>
      <pre id="session"></pre>
    </details>
  </div>

  <nav class="tabbar" aria-label="主导航">
    <button class="tab" data-go="home">主页</button>
    <button class="tab" data-go="homework">作业</button>
    <button class="tab" data-go="score">成绩</button>
    <button class="tab active" data-go="me">我的</button>
  </nav>
  <script src="../common/theme.js"></script>
  <script src="../common/native-android.js?v=1.3.0"></script>
  <script src="../common/platform.js?v=1.3.0"></script>
  <script src="./me.js"></script>
</body>
</html>
