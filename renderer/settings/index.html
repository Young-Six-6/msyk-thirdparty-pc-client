<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>设置</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./settings.css"/>
</head>
<body>
  <div class="app-top">
    <button id="backBtn" class="btn ghost">← 返回</button>
    <div class="title">设置</div>
    <div style="width:60px"></div>
  </div>

  <div class="app-body">
    <div class="card">
      <div class="card-title">通用</div>

      <div class="row clickable theme">
        <span class="k">主题模式</span>
        <span class="v" id="themeText">暗色/浅色(点我)</span>
      </div>

      <div class="row">
        <span class="k">版本</span>
        <span class="v">v1.0.1</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">高级</div>
      <div class="row">
        <span class="k">调试模式</span>
        <span class="v">常开</span>
      </div>
    </div>
  </div>
</body>
<script src="../common/theme.js"></script>
<script src="./settings.js"></script>
</html>
