<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>设置</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./settings.css"/>
  <link rel="stylesheet" href="../common/responsive.css"/>
</head>
<body data-page="settings">
  <div class="app-top">
    <button id="backBtn" class="btn ghost">← 返回</button>
    <div class="title">设置</div>
    <div style="width:60px"></div>
  </div>

  <div class="app-body">
    <div class="card">
      <div class="card-title">通用</div>

      <div class="row clickable theme" id="themeRow">
        <span class="k">主题模式</span>
        <span class="v switchValue">
          <span id="themeText">深色</span>
          <span id="themeSwitch" class="switch" aria-hidden="true">
            <span class="switch-dot"></span>
          </span>
        </span>
      </div>

      <div class="row color-setting">
        <div class="color-setting-head">
          <span class="k">主题色</span>
          <span class="v" id="accentText">默认</span>
        </div>
        <div id="accentPalette" class="color-palette" role="radiogroup" aria-label="主题色预设"></div>
        <div class="color-actions">
          <label class="custom-color" for="customAccent">
            <input id="customAccent" type="color" aria-label="自定义主题色">
            <span>自定义</span>
          </label>
          <button id="resetAccent" class="reset-color" type="button">恢复默认</button>
        </div>
      </div>

      <div class="row">
        <span class="k">版本</span>
        <span class="v">v1.3.0</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">高级</div>
      <div class="row clickable debug" id="debugRow">
        <span class="k">调试模式</span>
        <span class="v debugValue">
          <span id="debugText">关闭</span>
          <span id="debugSwitch" class="switch" aria-hidden="true">
            <span class="switch-dot"></span>
          </span>
        </span>
      </div>
    </div>
  </div>
</body>
<script src="../common/theme.js"></script>
<script src="../common/native-android.js?v=1.3.0"></script>
<script src="../common/platform.js?v=1.3.0"></script>
<script src="./settings.js"></script>
</html>
