<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>设置</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./settings.css"/>
  <link rel="stylesheet" href="../common/responsive.css"/>
</head>
<body data-page="settings">
  <div class="app-top">
    <button id="backBtn" class="btn ghost">← 返回</button>
    <div class="title">设置</div>
    <div style="width:60px"></div>
  </div>

  <div class="app-body">
    <div class="card">
      <div class="card-title">通用</div>

      <div class="row clickable theme" id="themeRow">
        <span class="k">主题模式</span>
        <span class="v switchValue">
          <span id="themeText">深色</span>
          <span id="themeSwitch" class="switch" aria-hidden="true">
            <span class="switch-dot"></span>
          </span>
        </span>
      </div>

      <div class="row color-setting">
        <div class="color-setting-head">
          <span class="k">主题色</span>
          <span class="v" id="accentText">默认</span>
        </div>
        <div id="accentPalette" class="color-palette" role="radiogroup" aria-label="主题色预设"></div>
        <div class="color-actions">
          <label class="custom-color" for="customAccent">
            <input id="customAccent" type="color" aria-label="自定义主题色">
            <span>自定义</span>
          </label>
          <button id="resetAccent" class="reset-color" type="button">恢复默认</button>
        </div>
      </div>

      <div class="row">
        <span class="k">版本</span>
        <span class="v">v1.3.0</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">账户与安全</div>
      <button class="row clickable action-row" id="passwordRow" type="button">
        <span class="k">登录密码</span>
        <span class="v action-value">修改 <span aria-hidden="true">›</span></span>
      </button>
    </div>

    <div class="card">
      <div class="card-title">高级</div>
      <div class="row clickable debug" id="debugRow">
        <span class="k">调试模式</span>
        <span class="v debugValue">
          <span id="debugText">关闭</span>
          <span id="debugSwitch" class="switch" aria-hidden="true">
            <span class="switch-dot"></span>
          </span>
        </span>
      </div>
    </div>
  </div>

  <dialog id="passwordDialog" class="password-dialog">
    <form id="passwordForm" class="password-form" method="dialog">
      <div class="dialog-head">
        <div>
          <div class="dialog-title">修改密码</div>
          <div class="dialog-subtitle">新密码长度为 6–18 位</div>
        </div>
        <button id="passwordClose" class="icon-button" type="button" aria-label="关闭" title="关闭">×</button>
      </div>

      <label class="field">
        <span>原密码</span>
        <input id="oldPassword" name="oldPassword" type="password" autocomplete="current-password" required>
      </label>
      <label class="field">
        <span>新密码</span>
        <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" minlength="6" maxlength="18" required>
      </label>
      <label class="field">
        <span>确认新密码</span>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" maxlength="18" required>
      </label>

      <label class="show-password">
        <input id="showPassword" type="checkbox">
        <span>显示密码</span>
      </label>
      <div id="passwordStatus" class="form-status" role="status" aria-live="polite"></div>
      <div class="dialog-actions">
        <button id="passwordCancel" class="btn" type="button">取消</button>
        <button id="passwordSubmit" class="btn primary" type="submit">确认修改</button>
      </div>
    </form>
  </dialog>
</body>
<script src="../common/theme.js"></script>
<script src="../common/native-android.js?v=1.3.0"></script>
<script src="../common/platform.js?v=1.3.0"></script>
<script src="./settings.js"></script>
</html>
