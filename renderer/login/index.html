<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>登录</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./login.css"/>
  <link rel="stylesheet" href="../common/responsive.css"/>
</head>
<body data-page="login">
  <div class="box">
    <h1>用户登录</h1>
    <div class="card">
      <input id="username" placeholder="用户名" autocomplete="off"/>
      <input id="password" placeholder="密码" type="password" autocomplete="off"/>
      <input id="macAddress" type="text" placeholder="MAC 地址（可选，默认 02:00:00:00:00:00）" />
      
      <label class="remember-label">
        <input id="remember" type="checkbox" /> 记住密码
      </label>

      <button id="btn">登录</button>
      <p id="tips"></p>
    </div>
  </div>
  <script src="../common/theme.js"></script>
  <script src="../common/native-android.js?v=1.3.0"></script>
  <script src="../common/platform.js?v=1.3.0"></script>
  <script src="./login.js"></script>
</body>
</html>
