<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>作业详情</title>
  <script src="../common/theme.js"></script>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./homeworkDetail.css">
  <link rel="stylesheet" href="../common/responsive.css">
</head>

<body data-page="homework-detail">
  <!-- 顶部栏 -->
  <div class="topbar" id="topbar">
    <button id="backBtn" class="back">← 返回</button>
    <div class="title" id="titleText">作业详情</div>
    <span id="timer" class="timer"></span>
    <button id="submitBtn" class="submitBtn" style="display:none;">提交阅读</button>
  </div>

  <!-- 题目导航栏 -->
  <div id="qNav" class="qNav" style="display:none;">
    <button id="prevBtn" class="navBtn" title="上一题 (←)">◀</button>
    <span id="qIndicator">第 1 / 1 题</span>
    <button id="nextBtn" class="navBtn" title="下一题 (→)">▶</button>
  </div>

  <webview
    id="wv"
    partition="persist:msyk"
    useragent="Mozilla/5.0 (Linux; Android 15; NE2210 Build/AP3A.240617.008; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/130.0.6723.58 Mobile Safari/537.36"
  ></webview>

  <div id="toast" class="toast" style="display:none;"></div>

  <script>
    window.Theme?.initTheme();

    const wv = document.getElementById('wv');
    const qNav = document.getElementById('qNav');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const qIndicator = document.getElementById('qIndicator');
    const submitBtn = document.getElementById('submitBtn');
    const timerEl = document.getElementById('timer');
    const titleEl = document.getElementById('titleText');
    const toastEl = document.getElementById('toast');

    /* ====== 状态 ====== */
    const urls = [];
    const resIds = [];       // 对应每题的 resourceId（阅读模式）
    let currentIdx = 0;
    let isReadMode = false;  // 是否为阅读材料模式
    let homeworkId = '';
    let modifyNum = 0;
    let listFrom = 'home';
    let startTime = 0;       // 开始阅读时间(ms)
    let perQStartTime = 0;   // 当前题开始时间

    /* ====== 工具 ====== */
    function toast(msg) {
      toastEl.textContent = String(msg || '');
      toastEl.style.display = 'block';
      clearTimeout(toast._t);
      toast._t = setTimeout(() => (toastEl.style.display = 'none'), 1800);
    }

    function fmtSec(sec) {
      sec = Math.max(0, Number(sec || 0));
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    /* ====== 参数解析 ====== */
    function parseParams() {
      const p = new URLSearchParams(location.search);

      isReadMode = p.get('isRead') === '1';
      homeworkId = p.get('homeworkId') || '';
      modifyNum = Number(p.get('modifyNum') || 0);
      listFrom = p.get('from') === 'me' ? 'me' : 'home';

      // 优先解析 urls（JSON 数组）
      const raw = p.get('urls');
      if (raw) {
        try {
          const arr = JSON.parse(raw);
          if (Array.isArray(arr) && arr.length > 0) {
            urls.push(...arr.filter(u => u && typeof u === 'string'));
          }
        } catch {}
      }

      // 兼容单 url
      if (!urls.length) {
        const single = p.get('url');
        if (single) urls.push(single);
      }

      // 阅读模式：resourceId 列表
      if (isReadMode) {
        const idsRaw = p.get('resIds');
        if (idsRaw) {
          try {
            const arr = JSON.parse(idsRaw);
            if (Array.isArray(arr)) resIds.push(...arr);
          } catch {}
        }
      }
    }

    /* ====== 导航 ====== */
    async function reportCurrentQTime() {
      if (!isReadMode) return;
      if (!perQStartTime) return;
      const used = String(Date.now() - perQStartTime);
      const resId = resIds[currentIdx];
      if (!resId) return;

      try {
        const fn = window.electronAPI?.submitReadTime;
        if (typeof fn !== 'function') {
          console.warn('[homeworkDetail] submitReadTime 不可用（preload 未刷新？）');
          return;
        }
        await fn({
          homeworkId,
          resourceId: resId,
          quesNum: String(currentIdx + 1),
          usedTime: used,
        });
      } catch (e) {
        console.warn('[homeworkDetail] reportCurrentQTime 失败:', e);
      }
    }

    async function navigateTo(index) {
      if (urls.length <= 1) return;
      const newIdx = Math.max(0, Math.min(urls.length - 1, index));
      if (newIdx === currentIdx) return;

      // 离开当前题：上报当前题用时
      await reportCurrentQTime();

      currentIdx = newIdx;
      wv.src = urls[currentIdx];
      perQStartTime = Date.now();
      updateNav();
    }

    function updateNav() {
      if (urls.length <= 1) {
        qNav.style.display = 'none';
        return;
      }
      qNav.style.display = 'flex';
      qIndicator.textContent = `第 ${currentIdx + 1} / ${urls.length} 题`;
      prevBtn.disabled = currentIdx <= 0;
      nextBtn.disabled = currentIdx >= urls.length - 1;
    }

    /* ====== 阅读模式：顶部栏 + 计时 + 提交 ====== */
    function initReadMode() {
      if (!isReadMode) return;

      titleEl.textContent = '阅读材料';
      submitBtn.style.display = '';
      startTime = Date.now();
      perQStartTime = startTime;

      // 计时器
      function tick() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        timerEl.textContent = fmtSec(elapsed);
      }
      tick();
      setInterval(tick, 1000);
    }

    async function doSubmitRead() {
      if (!confirm('确认提交阅读？提交后将无法继续阅读。')) return;

      try {
        // 先报最后一题用时
        await reportCurrentQTime();

        const fn = window.electronAPI?.submitReadCountTime;
        if (typeof fn !== 'function') {
          alert('提交接口不可用，请重启应用后再试');
          return;
        }

        toast('提交中...');
        const now = Date.now();
        const totalSec = Math.floor((now - startTime) / 1000);

        console.log('[homeworkDetail] 提交阅读:', { homeworkId, startTime, endTime: now, time: totalSec });
        const resp = await fn({
          homeworkId,
          startTime: String(startTime),
          endTime: String(now),
          time: String(totalSec),
        });
        console.log('[homeworkDetail] 提交阅读响应:', resp);

        if (!resp || resp.code !== 200) {
          alert(resp?.msg || '提交阅读失败');
          return;
        }

        toast('提交成功');
        setTimeout(() => {
          location.replace(`../homework/index.html?from=${listFrom}`);
        }, 600);
      } catch (e) {
        console.error('[homeworkDetail] doSubmitRead 异常:', e);
        alert('提交异常: ' + (e?.message || String(e)));
      }
    }

    /* ====== 初始化 ====== */
    parseParams();

    wv.src = urls.length > 0 ? urls[0] : 'about:blank';
    if (urls.length > 1) updateNav();

    initReadMode();

    /* ====== 暗色 CSS ====== */
    const BASE_DARK_CSS = `
      html, body {
        background: #0f1226 !important;
        color: #eaf2ff !important;
      }
    * {
        color: inherit !important;
        background: transparent !important;
        background-color: transparent !important;
        background-image: none !important;
        border-color: rgba(255,255,255,.15) !important;
    }
      img, video, canvas, svg {
        filter: brightness(.9) contrast(1.05) !important;
      }
      a { color: #9cc8ff !important; }
      table, td, th { background: transparent !important; }
      input, textarea, select {
        background: rgba(255,255,255,.06) !important;
        color: #eaf2ff !important;
        border: 1px solid rgba(255,255,255,.18) !important;
      }
    `;

    const QUESTION_CARD_EXTRA_CSS = `
      .dtk-container, .title-container {
        background: #161929 !important;
        border-color: rgba(255,255,255,.1) !important;
      }
      .col-333 { color: #eaf2ff !important; }
      .col-999 { color: #8899bb !important; }
      .right-score, .left-scroe {
        background: rgba(255,255,255,.08) !important;
        color: #7ecbff !important;
      }
      .right-answer-my span[class^="option"],
      .right-answer-my span[class*=" option"] {
        background: #1e2a45 !important;
        color: #eaf2ff !important;
      }
      .right-answer-my span.active {
        background: #2a5298 !important;
        color: #fff !important;
      }
      .span-class {
        background: rgba(255,255,255,.06) !important;
        color: #8899bb !important;
      }
      .span-class.active {
        background: #2a5298 !important;
        color: #fff !important;
      }
      .two-container-list {
        border-bottom-color: rgba(255,255,255,.08) !important;
      }
      .underline-input::after {
        background-color: rgba(255,255,255,.3) !important;
      }
      .tip-jie-answer { color: #ffb84d !important; }
      .teacherMessage { color: #c8d8f0 !important; }
    `;

    function injectDarkCss() {
      const theme = window.Theme?.getTheme?.() || 'dark';
      if (theme !== 'dark') return;
      let cur = '';
      try { cur = wv.getURL ? wv.getURL() : ''; } catch {}
      const isMaterial = /msyk\.wpstatic\.cn\/squirrel\/information\//.test(cur);
      const isQuestionCard = /www\.msyk\.cn\/webview\//.test(cur);
      if (!isMaterial && !isQuestionCard) return;
      const css = BASE_DARK_CSS + (isQuestionCard ? QUESTION_CARD_EXTRA_CSS : '');
      wv.insertCSS(css).catch(() => {});
    }

    wv.addEventListener('dom-ready',          injectDarkCss);
    wv.addEventListener('did-navigate',       injectDarkCss);
    wv.addEventListener('did-navigate-in-page', injectDarkCss);

    /* ====== 返回 ====== */
    async function goBack() {
      // 阅读模式：先报当前题用时
      await reportCurrentQTime();
      location.replace(`../homework/index.html?from=${listFrom}`);
    }

    document.getElementById('backBtn').addEventListener('click', goBack);

    /* ====== 导航按钮 ====== */
    prevBtn.addEventListener('click', () => navigateTo(currentIdx - 1));
    nextBtn.addEventListener('click', () => navigateTo(currentIdx + 1));

    /* ====== 提交按钮 ====== */
    submitBtn.addEventListener('click', doSubmitRead);

    /* ====== 键盘快捷键 ====== */
    window.addEventListener('keydown', (e) => {
      if (e.altKey && e.key === 'ArrowLeft') { goBack(); return; }
      if (urls.length <= 1) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        navigateTo(currentIdx - 1);
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        navigateTo(currentIdx + 1);
      }
    });
  </script>
</body>
</html>
