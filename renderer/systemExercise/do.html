<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>系统练习</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./do.css">
</head>
<body data-page="system-exercise-do">

    <button id="closeBtn" class="icon-btn" type="button" aria-label="退出练习" title="退出练习">&#215;</button>
    <strong id="progress">第 1 题</strong>
    <span id="timer">00:00:00</span>
    <button id="submitBtn" class="submit-btn" type="button">提交练习</button>
  </header>
  <main><webview id="questionView" partition="persist:msyk" data-viewer-title="系统练习题目"></webview></main>
  <nav id="answerBar" class="answerbar" aria-label="题目导航"></nav>
  <script src="../common/theme.js"></script>
  <script src="../common/native-android.js?v=1.3.0"></script>
  <script src="../common/platform.js?v=1.3.0"></script>
  <script src="./do.js"></script>
</body>
</html>
