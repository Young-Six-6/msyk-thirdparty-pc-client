<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>系统练习</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="../common/responsive.css">
  <link rel="stylesheet" href="./systemExercise.css">
</head>
<body data-page="system-exercise">
  <header class="topbar">
    <button id="backBtn" class="icon-btn" type="button" aria-label="返回" title="返回">&#8592;</button>
    <div><h1>系统练习</h1><p id="statusText">正在读取练习设置</p></div>
    <button id="historyBtn" class="history-btn" type="button">练习统计</button>
  </header>
  <main>
    <section class="controls" aria-label="练习范围">
      <label>年级<select id="gradeSelect"></select></label>
      <label>科目<select id="subjectSelect"></select></label>
      <label id="editionField">版本<select id="editionSelect"></select></label>
      <label id="bookField">教材<select id="bookSelect"></select></label>
    </section>
    <div class="mode-tabs" role="tablist">
      <button class="active" data-mode="chapter" role="tab">章节练习</button>
      <button data-mode="knowledge" role="tab">知识点练习</button>
    </div>
    <section class="tree-panel">
      <div class="tree-head">
        <button id="upBtn" class="icon-btn" type="button" disabled aria-label="返回上一级" title="返回上一级">&#8592;</button>
        <div><strong id="treeTitle">选择章节</strong><span id="selectedCount">已选 0 项</span></div>
      </div>
      <div id="nodeList" class="node-list" aria-live="polite"></div>
    </section>
  </main>
  <footer class="actionbar">
    <div id="selectionSummary">请选择练习内容</div>
    <button id="startBtn" class="primary-btn" type="button" disabled>开始练习</button>
  </footer>
  <script src="../common/theme.js"></script>
  <script src="../common/native-android.js?v=1.3.0"></script>
  <script src="../common/platform.js?v=1.3.0"></script>
  <script src="./systemExercise.js"></script>
</body>
</html>
