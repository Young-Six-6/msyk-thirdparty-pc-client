<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>练习统计</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./history.css">
</head>
<body>
  <header class="topbar">
    <button id="backBtn" class="icon-btn" type="button" aria-label="返回" title="返回">&#8592;</button>
    <div><h1>练习统计</h1><p id="subtitle">正在读取答题历史</p></div>
  </header>
  <main>
    <section id="monthSummary" class="summary" aria-label="本月统计"></section>
    <div class="history-head">
      <h2>答题历史</h2>
      <input id="monthInput" type="month" aria-label="统计月份">
    </div>
    <section id="historyList" class="history-list" aria-live="polite"></section>
    <button id="moreBtn" class="more-btn" type="button" hidden>加载更多</button>
  </main>
  <script src="../common/theme.js"></script>
  <script src="../common/native-android.js?v=1.3.0"></script>
  <script src="../common/platform.js?v=1.3.0"></script>
  <script src="./history.js"></script>
</body>
</html>
