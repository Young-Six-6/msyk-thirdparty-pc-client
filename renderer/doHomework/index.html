<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>做作业</title>
  <link rel="stylesheet" href="../common/theme.css">
  <link rel="stylesheet" href="./doHomework.css" />
  <link rel="stylesheet" href="../common/responsive.css" />
</head>
<body data-page="do-homework">
  <div class="topbar">
    <button id="backBtn" class="btn ghost">返回</button>
    <div class="titleWrap">
      <div id="title" class="title">做作业</div>
      <div class="sub">
        <span id="timer">00:00</span>
        <span id="statusText"></span>
        <span id="debugAnswerTimePanel" class="debugAnswerTimePanel" style="display:none;">
          <label class="debugAnswerSwitch">
            <input id="debugAnswerTimeEnabled" type="checkbox">
            <span class="debugAnswerSwitchUi" aria-hidden="true"></span>
            <span>自定义时间</span>
          </label>
          <input id="debugAnswerTimeInput" class="debugAnswerTimeInput" type="text" inputmode="numeric" placeholder="秒或mm:ss" disabled>
          <button id="debugFillCorrectBtn" class="btn debugFillCorrectBtn" type="button">一键正确</button>
        </span>
      </div>
    </div>
    <button id="submitBtn" class="btn primary">提交</button>
  </div>

  <div class="main">
    <div class="pane left">
      <div class="paneTitle materialTitle">
        <span class="materialLabel">材料</span>
        <div id="materialNav" class="materialNav" style="display:none;">
          <button id="prevMaterialBtn" class="btn" type="button">上一张</button>
          <span id="materialIndicator">1 / 1</span>
          <button id="nextMaterialBtn" class="btn" type="button">下一张</button>
        </div>
      </div>
    
      <div class="pdfContainer">
        <webview id="pdfWv" partition="persist:msyk" allowpopups></webview>
        <div id="pdfEmpty" class="empty" style="display:none;">本作业没有材料 PDF</div>
      </div>
    </div>

    <div class="pane right">
      <div class="paneTitle">答题</div>

      <div class="qNav">
        <button id="prevQBtn" class="btn" title="上一题 (←)">◀ 上一题</button>
        <span id="qIndicator">第 1 / 1 题</span>
        <button id="nextQBtn" class="btn" title="下一题 (→)">下一题 ▶</button>
      </div>

      <div id="qList" class="qList"></div>

      <div class="actions">
        <button id="saveBtn" class="btn">保存</button>
        <button id="submitBtn2" class="btn primary">提交</button>
      </div>

      <input id="fileInput" type="file" accept="image/*" multiple style="display:none;" />
      <input id="audioInput" type="file" accept="audio/mpeg,.mp3" style="display:none;" />
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>
  <script src="../common/theme.js"></script>
  <script src="./doHomework.js"></script>
</body>
</html>
