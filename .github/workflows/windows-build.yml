name: Build Windows EXE and Android APK

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "是否发布 GitHub Release"
        required: true
        type: choice
        default: "no"
        options:
          - "no"
          - "yes"
      replace_existing_release:
        description: "如果同版本 Release/Tag 已存在，是否覆盖；通常选 no，发新版请先改 package.json version"
        required: true
        type: choice
        default: "no"
        options:
          - "no"
          - "yes"

permissions:
  contents: write

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apps:
    name: Build Windows EXE and Android APK
    runs-on: windows-latest

    env:
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            .cache\electron
            .cache\electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Resolve version from package.json
        shell: pwsh
        run: |
          $pkg = Get-Content -Raw package.json | ConvertFrom-Json
          $lock = Get-Content -Raw package-lock.json | ConvertFrom-Json -AsHashtable

          $pkgVersion = $pkg.version
          $lockVersion = $lock.packages[""].version
          $productName = if ($pkg.build.productName) { $pkg.build.productName } elseif ($pkg.name) { $pkg.name } else { "app" }

          if ([string]::IsNullOrWhiteSpace($pkgVersion)) {
            throw "package.json 缺少 version"
          }

          if ([string]::IsNullOrWhiteSpace($lockVersion)) {
            throw 'package-lock.json 缺少 packages[""].version'
          }

          if ($pkgVersion -ne $lockVersion) {
            throw "版本不一致：package.json=$pkgVersion, package-lock.json=$lockVersion。请先本地执行 npm install 并提交新的 package-lock.json。"
          }

          $tag = "v$pkgVersion"
          $title = "$productName $tag"

          "APP_VERSION=$pkgVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TITLE=$title" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "APP_VERSION=$pkgVersion"
          Write-Host "RELEASE_TAG=$tag"
          Write-Host "RELEASE_TITLE=$title"

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci

      - name: Build Windows installers
        shell: pwsh
        run: |
          npm run dist:win -- --publish never

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: pwsh
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Android APK
        shell: pwsh
        run: |
          .\android\gradlew.bat -p android :app:lintDebug :app:assembleDebug --stacktrace

          $source = Get-ChildItem -Path android/app/build/outputs/apk/debug -File -Filter *.apk | Select-Object -First 1
          if (-not $source) {
            throw "Android 构建完成但没有找到 APK"
          }

          $target = Join-Path $source.DirectoryName "msyk-android-v$env:APP_VERSION-debug.apk"
          if ($source.FullName -ne $target) {
            Move-Item -LiteralPath $source.FullName -Destination $target -Force
          }

      - name: Show build files
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -Recurse | Select-Object FullName, Length
          Get-ChildItem -Path android/app/build/outputs/apk -Recurse -File -Filter *.apk | Select-Object FullName, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-v${{ env.APP_VERSION }}
          path: |
            dist/**/*.exe
            dist/**/*.blockmap
            dist/**/latest.yml
            dist/**/builder-debug.yml
            dist/**/builder-effective-config.yaml
          if-no-files-found: error

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-v${{ env.APP_VERSION }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Prepare release tag
        if: ${{ inputs.publish_release == 'yes' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPLACE_EXISTING_RELEASE: ${{ inputs.replace_existing_release }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch --tags --force

          $releaseExists = $false
          gh release view $env:RELEASE_TAG 2>$null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }

          $tagExists = $false
          $tag = git tag -l $env:RELEASE_TAG
          if (-not [string]::IsNullOrWhiteSpace($tag)) {
            $tagExists = $true
          }

          if (($releaseExists -or $tagExists) -and $env:REPLACE_EXISTING_RELEASE -ne "yes") {
            throw "版本 $env:RELEASE_TAG 已存在。请把 package.json 的 version 升级后再发布；或手动选择 replace_existing_release=yes 覆盖。"
          }

          if ($releaseExists -and $env:REPLACE_EXISTING_RELEASE -eq "yes") {
            Write-Host "Deleting existing release: $env:RELEASE_TAG"
            gh release delete $env:RELEASE_TAG --yes --cleanup-tag
          }

          if ($tagExists -and $env:REPLACE_EXISTING_RELEASE -eq "yes") {
            Write-Host "Deleting existing tag: $env:RELEASE_TAG"
            git tag -d $env:RELEASE_TAG 2>$null
            git push origin ":refs/tags/$env:RELEASE_TAG" 2>$null
          }

          Write-Host "Creating tag: $env:RELEASE_TAG"
          git tag $env:RELEASE_TAG
          git push origin $env:RELEASE_TAG

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release == 'yes' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = @()
          $files += Get-ChildItem -Path dist -Recurse -File -Filter *.exe | ForEach-Object { $_.FullName }
          $files += Get-ChildItem -Path dist -Recurse -File -Filter *.blockmap | ForEach-Object { $_.FullName }
          $files += Get-ChildItem -Path dist -Recurse -File -Filter latest.yml | ForEach-Object { $_.FullName }
          $files += Get-ChildItem -Path android/app/build/outputs/apk/debug -Recurse -File -Filter *.apk | ForEach-Object { $_.FullName }

          if ($files.Count -eq 0) {
            throw "dist 目录中没有找到可发布文件"
          }

          Write-Host "Release tag: $env:RELEASE_TAG"
          Write-Host "Release title: $env:RELEASE_TITLE"
          Write-Host "Files:"
          $files | ForEach-Object { Write-Host " - $_" }

          gh release create $env:RELEASE_TAG @files `
            --title "$env:RELEASE_TITLE" `
            --notes "自动构建版本：$env:APP_VERSION`n包含：Windows EXE、Android debug-signed APK`n提交：$env:GITHUB_SHA" `
            --latest
